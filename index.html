<body>

    <div id="coze-chat-window"></div>

    <script>
        const client = new CozeWebSDK.ChatClient({
            config: {
                bot_id: '7619999434403086336', // 确认是你的 appId
            },
            componentProps: {
                title: '医保报销审查官',
                layout: 'pc',
            },
            auth: {
                type: 'token',
                token: 'pat_Enc1sQFiEz8uztSAuIa3ga1nrO1UB6nhMxmnHsYiKSYd9AJBxzQaTgiphtzRzcW9', //
            }
        });

        client.mount('#coze-chat-window');
