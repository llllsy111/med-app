<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>医保报销管家-正式版</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background-color: #f0f2f5; font-family: sans-serif; }
        #sidebar { width: 300px; background: #f7f9fa; border-right: 1px solid #e1e4e8; padding: 20px; box-sizing: border-box; }
        #coze-chat-window { flex: 1; height: 100%; background: white; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #007bff; color: white; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #0056b3; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-green { background: #28a745; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>📂 档案管理</h2>
        <div class="card">
            <button class="btn" id="btn1" onclick="triggerBot('查看我的家属档案')" disabled>👥 查看家属信息</button>
            <button class="btn" id="btn2" onclick="triggerBot('我要上传单据预审')" disabled>📸 上传单据预审</button>
        </div>
        <div class="card">
            <button class="btn btn-green" id="btn3" onclick="triggerBot('如何办理支付宝医保亲属卡')" disabled>💳 支付宝亲属卡</button>
        </div>
        <div id="status" style="font-size: 12px; color: orange;">正在连接 AI 助手...</div>
    </div>

    <div id="coze-chat-window"></div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-sdk/1.0.1-beta.0/index.js"></script>
    <script>
        let cozeClient = null;

        // 等待 SDK 加载完成
        window.onload = function() {
            try {
                cozeClient = new CozeWebSDK.ChatClient({
                    config: {
                        bot_id: '7619999434403086336', // 👈 填入你的 Bot ID
                    },
                    componentProps: {
                        title: '医保报销审查官',
                        layout: 'pc',
                    },
                    auth: {
                        type: 'token',
                        token: 'pat_Enc1sQFiEz8uztSAuIa3ga1nrO1UB6nhMxmnHsYiKSYd9AJBxzQaTgiphtzRzcW9', // 👈 填入你的 Token
                    }
                });

                cozeClient.mount('#coze-chat-window');
                
                // 连接成功后开启按钮
                document.getElementById('status').innerText = '✅ 连接成功';
                document.getElementById('status').style.color = 'green';
                document.querySelectorAll('.btn').forEach(b => b.disabled = false);
            } catch (e) {
                document.getElementById('status').innerText = '❌ 连接失败，请检查配置';
                console.error(e);
            }
        };

        function triggerBot(text) {
            if (cozeClient) {
                cozeClient.sendMessage(text);
            } else {
                alert('AI 助手尚未准备就绪，请刷新重试');
            }
        }
    </script>
</body>
</html>
